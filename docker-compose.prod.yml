version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: sliitek_redis
    ports:
      - "6379:6379"
    restart: always
    networks:
      - sliitek_net

  backend_a:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/sliitek-backend:${BACKEND_IMAGE_TAG:-latest}
    container_name: sliitek_backend_a
    ports:
      - "5001:5000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=5000
    restart: always
    depends_on:
      - redis
    networks:
      - sliitek_net

  backend_b:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/sliitek-backend:${BACKEND_IMAGE_TAG:-latest}
    container_name: sliitek_backend_b
    ports:
      - "5002:5000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=5000
    restart: always
    depends_on:
      - redis
    networks:
      - sliitek_net

  frontend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/sliitek-frontend:${FRONTEND_IMAGE_TAG:-latest}
    container_name: sliitek_frontend
    ports:
      - "3000:80"
    restart: always
    depends_on:
      - backend_a
      - backend_b
    networks:
      - sliitek_net

networks:
  sliitek_net:
    driver: bridge
